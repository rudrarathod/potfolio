<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/potfolio/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rudra Potfolio</title>

  <script src="https://kit.fontawesome.com/3d9a7ee55e.js" crossorigin="anonymous"></script>

  <style>
    .cursor {
      display: block;
      width: 30px;
      height: 30px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%);
      border-radius: 50%;
      background: transparent;
      pointer-events: none;
      z-index: 111;
      border: 1px solid #fff;
      /* transition: all 0.2s ease-out; */
      animation: moveCursor1 .5s infinite alternate;

      display: flex;
      justify-content: center;
      align-items: center;
      color: #fbff00;
      font-size: 20px;
      font-weight: 600;
    }

    .expand {
      background: transparent;
      animation: moveCursor2 .5s forwards;
      border: 1px solid yellow;
    }

    @keyframes moveCursor1 {
      from {
        transform: scale(1);
      }

      to {
        transform: scale(.8);
      }
    }

    @keyframes moveCursor2 {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(2.5);
      }

      100% {
        transform: scale(1);
        opacity: 0;
      }
    }
  </style>
  <script type="module" crossorigin src="/potfolio/assets/index-DHJ4YSco.js"></script>
  <link rel="stylesheet" crossorigin href="/potfolio/assets/index-CzIziK1u.css">
</head>

<body>
  <div class="cursor">·</div>
  <script>
    const cursor = document.querySelector('.cursor');

    document.addEventListener('mousemove', e => {
      cursor.setAttribute("style", "top: " + (e.pageY - 10) + "px; left: " + (e.pageX - 10) + "px;")
    });

    document.addEventListener('click', e => {
      cursor.classList.add("expand");
      setTimeout(() => {
        cursor.classList.remove("expand");
      }, 500);
    });
  </script>
  <div id="root"></div>
</body>

</html>
