<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rudra Rathod | Portfolio</title>
  <meta name="description" content="Rudra Rathod - AI & ML student at ISBM College of Engineering. Experienced in IoT, Robotics, Web development, and Workflow automation." />
  <meta name="keywords" content="Rudra Rathod, Portfolio, AI student, ML, IoT, Web Developer, Robotics, ISBM College of Engineering" />

  <script src="https://kit.fontawesome.com/3d9a7ee55e.js" crossorigin="anonymous"></script>

  <style>
    .cursor-container {
      position: absolute;
      top: 0;
      left: 0;
      will-change: transform;
      pointer-events: none;
      z-index: 9999;
    }

    .cursor-dot {
      display: flex;
      width: 30px;
      height: 30px;
      position: absolute;
      top: -15px;
      left: -15px;
      border-radius: 50%;
      background: transparent;
      pointer-events: none;
      border: 1px solid #fff;
      animation: moveCursor1 .5s infinite alternate;
      justify-content: center;
      align-items: center;
      color: #fbff00;
      font-size: 20px;
      font-weight: 600;
    }

    .cursor-dot.expand {
      background: transparent;
      animation: moveCursor2 .5s forwards;
      border: 1px solid yellow;
    }

    @keyframes moveCursor1 {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(.8);
      }
    }

    @keyframes moveCursor2 {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(2.5);
      }
      100% {
        transform: scale(1);
        opacity: 0;
      }
    }

    /* Hide custom cursor on touch devices for accessibility and smooth operation */
    @media (max-width: 768px) {
      .cursor-container {
        display: none !important;
      }
      :root {
        cursor: auto !important;
      }
    }
  </style>
</head>

<body>
  <div class="cursor-container">
    <div class="cursor-dot">·</div>
  </div>
  <script>
    const cursorContainer = document.querySelector('.cursor-container');
    const cursorDot = document.querySelector('.cursor-dot');

    // Use fast translate3d positioning (runs on GPU compositor thread)
    document.addEventListener('mousemove', e => {
      cursorContainer.style.transform = `translate3d(${e.pageX}px, ${e.pageY}px, 0)`;
    });

    document.addEventListener('click', e => {
      cursorDot.classList.add("expand");
      setTimeout(() => {
        cursorDot.classList.remove("expand");
      }, 500);
    });
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
